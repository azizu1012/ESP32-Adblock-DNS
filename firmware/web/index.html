<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 AdBlocker</title>
<link rel="icon" href="data:,">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0}
.boot{text-align:center}
.spinner{width:48px;height:48px;border:3px solid #1e293b;border-top-color:#818cf8;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 16px}
@keyframes s{to{transform:rotate(360deg)}}
.boot p{font-size:13px;opacity:.6}
.boot .err{color:#f87171;opacity:1;margin-top:12px}
</style>
</head>
<body>
<div class="boot" id="boot">
<div class="spinner" id="sp"></div>
<p id="msg">Connecting...</p>
</div>
<script>
(async function(){
  var UI='esp32_ui',VER='esp32_ui_v',msg=document.getElementById('msg');
  try{
    // Stage 1: Kiểm tra version UI từ server
    msg.textContent='Checking UI version...';
    var r=await fetch('/api/ui/version');
    var d=await r.json();
    var sv=d.v;
    var cv=null,cu=null;
    try{cv=localStorage.getItem(VER);cu=localStorage.getItem(UI)}catch(e){}

    if(cu&&cv===sv){
      // Stage 2 SKIP: UI đã cached đúng version → render ngay
      msg.textContent='Loading from cache...';
      document.open();document.write(cu);document.close();
      return;
    }

    // Stage 2: Tải UI bundle từ server (chỉ lần đầu hoặc khi UI thay đổi)
    msg.textContent='Downloading UI...';
    var u=await fetch('/api/ui');
    var html=await u.text();
    try{localStorage.setItem(UI,html);localStorage.setItem(VER,sv)}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    // Fallback 1: Neu loi mang hoac bi Web Server chan do het RAM, dung lai ban cu neu co
    try{
      var cv2=localStorage.getItem(VER), cu2=localStorage.getItem(UI);
      if(cv2 && cu2){
        msg.textContent='Offline cache mode...';
        document.open();document.write(cu2);document.close();
        return;
      }
    }catch(e2){}
    
    // Fallback 2: Thu tai file truc tiep
    try{
      msg.textContent='Direct loading...';
      var f=await fetch('/api/ui');
      var h=await f.text();
      document.open();document.write(h);document.close();
    }catch(e3){
      document.getElementById('sp').style.display='none';
      msg.innerHTML='Connection failed.<br><a href="/" style="color:#818cf8">Retry</a>';
      msg.classList.add('err');
    }
  }
})();
</script>
</body>
</html>
