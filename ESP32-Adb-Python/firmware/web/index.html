<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 AdBlocker</title>
<link rel="icon" href="data:,">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0}
.boot{text-align:center}
.spinner{width:48px;height:48px;border:3px solid #1e293b;border-top-color:#818cf8;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 16px}
@keyframes s{to{transform:rotate(360deg)}}
.boot p{font-size:13px;opacity:.6}
.boot .err{color:#f87171;opacity:1;margin-top:12px}
</style>
</head>
<body>
<div class="boot" id="boot">
<div class="spinner" id="sp"></div>
<p id="msg">Connecting...</p>
</div>
<script>
var UI='ui_app',VER='ui_ver';
async function load(){
  var msg=document.getElementById('msg');
  var cu=localStorage.getItem(UI);
  var cv=localStorage.getItem(VER);

  if(cu){
    // 1. Render ngay lập tức từ cache, 0ms delay!
    document.open();document.write(cu);document.close();
    
    // 2. Chạy ngầm kiểm tra phiên bản (version check)
    try {
      var res = await fetch('/api/ui', {method: 'HEAD'});
      var etag = res.headers.get('ETag');
      if (etag && etag !== cv) {
        // UI đã có bản mới -> Tải nền và lưu
        var u = await fetch('/api/ui');
        var html = await u.text();
        localStorage.setItem(UI, html);
        localStorage.setItem(VER, etag);
        // Tải xong không reload ngay để tránh gián đoạn, người dùng F5 sẽ thấy
      }
    } catch(e) {}
    return;
  }
  
  // Tải UI bundle từ server (chỉ lần đầu)
  try{
    msg.textContent='Downloading UI...';
    var u=await fetch('/api/ui');
    var etag=u.headers.get('ETag');
    var html=await u.text();
    try{
      localStorage.setItem(UI,html);
      if(etag) localStorage.setItem(VER,etag);
    }catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('sp').style.display='none';
    msg.innerHTML='Connection failed.<br><a href="/" style="color:#818cf8">Retry</a>';
    msg.classList.add('err');
  }
}
window.onload=load;
</script>
</body>
</html>
